    <form>
        <fieldset>
            <legend>Form</legend>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="Enter Username" required autofocus>
            <br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter Password" required>

            <br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter Email" required>
            <br><br>
            <label for="phNum">Ph Number:</label>
            <input type="tel" id="phNum" minlength="10" maxlength="10" placeholder="Enter Ph Number" required>
            <br><br>
            <label for="dob">Date of Birth:</label>
            <input type="datetime-local" id="dob" placeholder="dob" required>
            <br><br>
            <label for="age">Age</label>
            <input type="number" id="age" placeholder="Age" required min="18" max="24">
            <br><br>
            <label for="gender">Gender:</label>
            <input type="radio" name="gender" value="male">Male
            <input type="radio" name="gender" value="FeMale">FeMale
            <input type="radio" name="gender" value="Others">Others
            <br><br>
            <label for="states">Select States</label>
            <select name="state" id="states">
                <option value="Karnataka">Karnataka</option>
                <option value="Kerla">Kerla</option>
                <option value="Andra">Andra </option>
                <option value="Tamil Nadu">Tamil Nadu</option>

            </select>
            <br><br>
            <label for="skills">Skills</label>
            <input type="checkbox" value="Java">Java
            <input type="checkbox" value="Python">Python
            <input type="checkbox" value="SQL">SQL
            <input type="checkbox" value="WEB">WEB
            <input type="checkbox" value="React JS" checked>React JS
            <br><br>
            <label for="address">Enter Address:</label>
            <textarea name="address" id="address" rows="3" cols="25"></textarea>
            <br><br>
            <label for="color">Select Color</label>
            <input type="color" id="color">
            <br><br>
            <label for="file">Uplode Some File</label>
            <input type="file" id="file">
            <br><br>
            <label for="range">Select Range</label>
            <input type="range" id="range" step="2" min="0" max="10"> 
            <br><br>
            <label for="img">Uplode Image</label>
            <input type="image" id="img" height="50px" width="50px" src="https://documents.iplt20.com/ipl/IPLHeadshot2025/2.png">
            <br><br>
            <label for="month">Select Month</label>
            <input type="month">
            <br><br>
            <label for="month">Select Week</label>
            <input type="week">
            <br><br>

            <input type="submit">
            <input type="reset">

        </fieldset>
    </form>
</body>

</html>
