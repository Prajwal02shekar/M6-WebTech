<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        li:first-child{
            background-color: red;
        }
        li:last-child{
            background-color: blue;
        }
        li:nth-child(3){
           background-color: magenta; 
        }
    </style>
</head>

<body>
    <ul>
        <li>Prajwal</li>
        <li>Balaji</li>
        <li>Sakshi</li>
        <li>Rakshitha</li>
        <li>DG</li>
        <li>Afnan</li>
    </ul>
</body>

</html>
